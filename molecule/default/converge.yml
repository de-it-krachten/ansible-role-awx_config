---

- name: Converge
  hosts: all
  vars:

    # awx_config
    awx_url: https://localhost
    awx_validate_certs: false
    awx_user: admin
    awx_pass: 'Admin123!'
    awx_manage_roles: false
    awx_version: "24.6.1"

    awx_organizations:
      - name: organization1
        short_name: org1
        description: Company organization nr1
        file: org1.yml
        # galaxy_credentials:
        #   - Ansible Galaxy
      - name: organization2
        short_name: org2
        description: Company organization nr2
        file: org2.yml

    awx_organization_path: molecule/default/tests/data

  roles:
    - deitkrachten.awx_cli

  tasks:

    - name: Pause play until a URL is reachable from this host
      uri:
        url: "{{ awx_url }}"
        validate_certs: "{{ awx_validate_certs }}"
        follow_redirects: yes
        method: GET
      register: _result
      until: _result.status == 200
      retries: 30
      delay: 10

    - name: Get Oauth token
      include_role:
        name: ansible-role-awx_config
        tasks_from: login.yml

    - name: Include role 'ansible-role-awx_config'
      include_role:
        name: ansible-role-awx_config
